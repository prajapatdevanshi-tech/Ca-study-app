<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Documents - CA Study Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        .dark body {
            background-color: #111827;
        }
        .header-gradient {
            background: linear-gradient(-45deg, #4f46e5, #ec4899, #22d3ee, #f59e0b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .progress-circle {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: conic-gradient(#7c3aed calc(var(--progress, 0) * 1%), #e5e7eb 0);
            transition: background 0.5s;
        }
        .progress-circle::before {
            content: "";
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
        }
        .dark .progress-circle::before {
             background-color: #1f2937;
        }
        .progress-value {
            position: relative;
            font-size: 1.3rem;
            font-weight: 700;
            color: #7c3aed;
        }
        .file-input-label {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            background-color: #3b82f6;
            color: white;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .file-input-label:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body class="dark:bg-gray-900">

    <!-- Main Container -->
    <div class="w-full min-h-screen">
        <!-- Header Section -->
        <header class="header-gradient p-8 rounded-b-3xl shadow-lg">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div id="header-title-container">
                    <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight flex items-center">
                        <span id="student-name">CA Add Name</span>
                        <button id="edit-name-btn" class="ml-3 text-white/80 hover:text-white text-lg"><i class="fas fa-pencil-alt"></i></button>
                    </h1>
                    <p class="text-lg font-semibold text-white/80">ROAD TO BECOME CA</p>
                </div>
                <div class="flex items-center space-x-4">
                     <div class="progress-circle" style="--progress: 0;" title="Overall Progress">
                         <span class="progress-value">0%</span>
                    </div>
                    <button id="theme-toggle" class="text-white text-2xl"><i class="fas fa-moon"></i></button>
                </div>
            </div>
        </header>

        <!-- Page Content Area -->
        <div class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 md:p-8 shadow-lg">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold text-gray-800 dark:text-white">Important Documents</h2>
                    <a href="index.html" class="inline-flex items-center text-sm font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Back to Home
                    </a>
                </div>

                <div class="space-y-4">
                    <!-- CA Documents Section -->
                    <details class="group bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg" data-category="caDocs">
                        <summary class="font-bold text-lg text-purple-700 dark:text-purple-400 cursor-pointer list-none flex justify-between items-center">
                            <span><i class="fas fa-graduation-cap mr-3"></i>CA Documents</span>
                            <i class="fas fa-chevron-down transition-transform duration-300 group-open:rotate-180"></i>
                        </summary>
                        <div class="mt-4 pt-4 border-t dark:border-gray-600">
                            <div id="caDocs-list" class="space-y-2 mb-4"></div>
                            <div class="flex items-end space-x-2">
                                <div class="flex-grow"><label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Document Description</label><input type="text" placeholder="e.g., Final Exam Form" class="doc-desc-input w-full p-2 border rounded-md text-sm"></div>
                                <div class="flex-shrink-0"><label class="file-input-label inline-block"><i class="fas fa-upload mr-2"></i>Upload</label><input type="file" class="hidden doc-file-input"></div>
                                <button class="add-doc-btn bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 text-sm font-semibold">Add</button>
                            </div>
                        </div>
                    </details>

                    <!-- Personal Details Section -->
                    <details class="group bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg" data-category="personalDocs">
                        <summary class="font-bold text-lg text-purple-700 dark:text-purple-400 cursor-pointer list-none flex justify-between items-center">
                            <span><i class="fas fa-id-card mr-3"></i>Personal Details</span>
                            <i class="fas fa-chevron-down transition-transform duration-300 group-open:rotate-180"></i>
                        </summary>
                        <div class="mt-4 pt-4 border-t dark:border-gray-600">
                             <div id="personalDocs-list" class="space-y-2 mb-4"></div>
                            <div class="flex items-end space-x-2">
                                <div class="flex-grow"><label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Document Description</label><input type="text" placeholder="e.g., Aadhar Card" class="doc-desc-input w-full p-2 border rounded-md text-sm"></div>
                                <div class="flex-shrink-0"><label class="file-input-label inline-block"><i class="fas fa-upload mr-2"></i>Upload</label><input type="file" class="hidden doc-file-input"></div>
                                <button class="add-doc-btn bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 text-sm font-semibold">Add</button>
                            </div>
                        </div>
                    </details>

                    <!-- Other Important Documents Section -->
                    <details class="group bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg" data-category="otherDocs">
                        <summary class="font-bold text-lg text-purple-700 dark:text-purple-400 cursor-pointer list-none flex justify-between items-center">
                            <span><i class="fas fa-folder-plus mr-3"></i>Other Important Documents</span>
                            <i class="fas fa-chevron-down transition-transform duration-300 group-open:rotate-180"></i>
                        </summary>
                        <div class="mt-4 pt-4 border-t dark:border-gray-600">
                             <div id="otherDocs-list" class="space-y-2 mb-4"></div>
                            <div class="flex items-end space-x-2">
                                <div class="flex-grow"><label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Document Description</label><input type="text" placeholder="e.g., Passport Photo" class="doc-desc-input w-full p-2 border rounded-md text-sm"></div>
                                <div class="flex-shrink-0"><label class="file-input-label inline-block"><i class="fas fa-upload mr-2"></i>Upload</label><input type="file" class="hidden doc-file-input"></div>
                                <button class="add-doc-btn bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 text-sm font-semibold">Add</button>
                            </div>
                        </div>
                    </details>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const studentNameEl = document.getElementById('student-name');
            const editNameBtn = document.getElementById('edit-name-btn');

            // --- Name Logic ---
            const loadName = () => {
                const savedName = localStorage.getItem('caStudentName');
                studentNameEl.textContent = savedName || 'CA Add Name';
            };
            
            editNameBtn.addEventListener('click', () => {
                const currentName = (studentNameEl.textContent.startsWith('CA ') ? studentNameEl.textContent.substring(3) : studentNameEl.textContent).replace('Add Name', '').trim();
                const newName = prompt('Enter your name:', currentName);
                if (newName && newName.trim() !== '') {
                    localStorage.setItem('caStudentName', 'CA ' + newName.trim());
                    loadName();
                } else if (newName === '') { // If user enters an empty string, reset to default
                    localStorage.removeItem('caStudentName');
                    loadName();
                }
            });

            // --- Dark Mode Toggle Logic ---
            const themeToggle = document.getElementById('theme-toggle');
            if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.documentElement.classList.remove('dark');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
                themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            // --- Document Management Logic ---
            let docsData = JSON.parse(localStorage.getItem('caDocsData')) || { caDocs: [], personalDocs: [], otherDocs: [] };

            const saveData = () => {
                localStorage.setItem('caDocsData', JSON.stringify(docsData));
            };

            const renderDocs = (category) => {
                const container = document.getElementById(`${category}-list`);
                container.innerHTML = '';
                if (docsData[category].length === 0) {
                    container.innerHTML = `<p class="text-sm text-gray-500 dark:text-gray-400 text-center">No documents added yet.</p>`;
                    return;
                }
                docsData[category].forEach((doc, index) => {
                    const docEl = document.createElement('div');
                    docEl.className = 'flex items-center justify-between bg-white dark:bg-gray-800 p-2 rounded-md shadow-sm';
                    docEl.innerHTML = `
                        <span class="truncate text-sm flex-grow"><i class="fas ${doc.type.startsWith('image') ? 'fa-file-image' : 'fa-file-pdf'} mr-2"></i>${doc.desc || doc.name}</span>
                        <button data-index="${index}" data-category="${category}" class="delete-doc-btn text-red-500 hover:text-red-700 ml-4 text-lg font-bold">&times;</button>
                    `;
                    container.appendChild(docEl);
                });
            };

            document.querySelectorAll('details[data-category]').forEach(section => {
                const category = section.dataset.category;
                const addBtn = section.querySelector('.add-doc-btn');
                const descInput = section.querySelector('.doc-desc-input');
                const fileInput = section.querySelector('.doc-file-input');
                const fileLabel = section.querySelector('.file-input-label');

                // Connect label to file input
                fileLabel.addEventListener('click', () => fileInput.click());

                addBtn.addEventListener('click', () => {
                    const file = fileInput.files[0];
                    const desc = descInput.value.trim();

                    if (!file) {
                        alert('Please select a file to upload.');
                        return;
                    }
                    if (!desc) {
                        alert('Please provide a description for the document.');
                        return;
                    }

                    docsData[category].push({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        desc: desc
                    });

                    saveData();
                    renderDocs(category);

                    // Reset inputs
                    descInput.value = '';
                    fileInput.value = '';
                });

                renderDocs(category); // Initial render
            });
            
            document.querySelector('.space-y-4').addEventListener('click', (e) => {
                if(e.target.classList.contains('delete-doc-btn')) {
                    const category = e.target.dataset.category;
                    const index = parseInt(e.target.dataset.index, 10);
                    
                    if(confirm(`Are you sure you want to delete this document?`)) {
                        docsData[category].splice(index, 1);
                        saveData();
                        renderDocs(category);
                    }
                }
            });


            // --- Overall Progress Bar Logic ---
            const chapterData = {
                p1: [ { id: 'p1-c1', weight: 3.125 }, { id: 'p1-c2', weight: 3.125 }, { id: 'p1-c3', weight: 3.125 }, { id: 'p1-c4', weight: 3.125 }, { id: 'p1-c5', weight: 7 }, { id: 'p1-c6', weight: 7 }, { id: 'p1-c7', weight: 7 }, { id: 'p1-c8', weight: 7 }, { id: 'p1-c9', weight: 7 }, { id: 'p1-c10', weight: 6.67 }, { id: 'p1-c11', weight: 6.67 }, { id: 'p1-c12', weight: 6.67 }, { id: 'p1-c13', weight: 7.5 }, { id: 'p1-c14', weight: 7.5 }, { id: 'p1-c15', weight: 7.5 }, { id: 'p1-c16', weight: 7.5 } ],
                p2: [ { id: 'p2-c1', weight: 5 }, { id: 'p2-c2', weight: 5 }, { id: 'p2-c3', weight: 5 }, { id: 'p2-c4', weight: 13.33 }, { id: 'p2-c5', weight: 13.33 }, { id: 'p2-c6', weight: 13.34 }, { id: 'p2-c7', weight: 6.25 }, { id: 'p2-c8', weight: 6.25 }, { id: 'p2-c9', weight: 6.25 }, { id: 'p2-c10', weight: 6.25 }, { id: 'p2-c11', weight: 4 }, { id: 'p2-c12', weight: 4 }, { id: 'p2-c13', weight: 4 }, { id: 'p2-c14', weight: 4 }, { id: 'p2-c15', weight: 4 } ],
                p3: [ { id: 'p3-c1', weight: 10 }, { id: 'p3-c2', weight: 10 }, { id: 'p3-c3', weight: 10 }, { id: 'p3-c4', weight: 10 }, { id: 'p3-c5', weight: 10 }, { id: 'p3-c6', weight: 6.25 }, { id: 'p3-c7', weight: 6.25 }, { id: 'p3-c8', weight: 6.25 }, { id: 'p3-c9', weight: 6.25 }, { id: 'p3-c10', weight: 25 } ],
                p4: [ { id: 'p4-c1', weight: 27.5 }, { id: 'p4-c2', weight: 27.5 }, { id: 'p4-c3', weight: 7.5 }, { id: 'p4-c4', weight: 7.5 }, { id: 'p4-c5', weight: 7.5 }, { id: 'p4-c6', weight: 7.5 }, { id: 'p4-c7', weight: 7.5 }, { id: 'p4-c8', weight: 7.5 } ],
                p5: [ { id: 'p5-c1', weight: 25 }, { id: 'p5-c2', weight: 25 }, { id: 'p5-c3', weight: 25 }, { id: 'p5-c4', weight: 12.5 }, { id: 'p5-c5', weight: 12.5 } ],
                p6: [ { id: 'p6-c1', weight: 20 }, { id: 'p6-c2', weight: 20 }, { id: 'p6-c3', weight: 20 }, { id: 'p6-c4', weight: 20 }, { id: 'p6-c5', weight: 20 } ]
            };

            const calculateAndUpdateOverallProgress = () => {
                let totalCompletedWeight = 0;
                const totalPapers = Object.keys(chapterData).length;

                for (const paperId in chapterData) {
                    const paperChapters = chapterData[paperId];
                    let paperCompletedWeight = 0;
                    paperChapters.forEach(chapter => {
                        if (localStorage.getItem(chapter.id) === 'Completed') {
                            paperCompletedWeight += chapter.weight;
                        }
                    });
                    totalCompletedWeight += paperCompletedWeight;
                }

                const overallPercentage = Math.round(totalCompletedWeight / totalPapers);
                
                const progressCircle = document.querySelector('.progress-circle');
                const progressValue = document.querySelector('.progress-value');
                
                progressCircle.style.setProperty('--progress', overallPercentage);
                progressValue.textContent = `${overallPercentage}%`;
            };

            // Initial Load
            loadName();
            calculateAndUpdateOverallProgress();
            window.addEventListener('storage', calculateAndUpdateOverallProgress);
        });
    </script>

</body>
</html>
